spring:
  application:
    name: school-app-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    # DB_URL wins if set; otherwise built from individual host/port/name parts, which is what
    # Render's managed Postgres exposes (no jdbc: URL, just discrete connection fields).
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:school_app}}
    username: ${DB_USERNAME:school_app}
    password: ${DB_PASSWORD:school_app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-every-environment-min-32-bytes-long}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
  notification:
    sms:
      msg91:
        auth-key: ${MSG91_AUTH_KEY:}
        sender-id: ${MSG91_SENDER_ID:}
        route: ${MSG91_ROUTE:4}
    email:
      smtp:
        host: ${SES_SMTP_HOST:}
        port: ${SES_SMTP_PORT:587}
        username: ${SES_SMTP_USERNAME:}
        password: ${SES_SMTP_PASSWORD:}
        from-address: ${NOTIFICATION_FROM_EMAIL:no-reply@school.app}
  payment:
    razorpay:
      key-id: ${RAZORPAY_KEY_ID:}
      key-secret: ${RAZORPAY_KEY_SECRET:}
      webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  storage:
    local:
      base-dir: ${STORAGE_LOCAL_DIR:./storage}
  operator:
    # Where the operator console's "set your password" page lives; the activation email links here.
    activation-base-url: ${OPERATOR_ACTIVATION_BASE_URL:http://localhost:5174/activate}
  captcha:
    turnstile:
      secret-key: ${CAPTCHA_TURNSTILE_SECRET_KEY:}
  platform:
    # Notified (email) whenever the public signup form (MT-4) gets a new submission.
    team-email: ${PLATFORM_TEAM_EMAIL:platform-team@school.app}
  rate-limit:
    # Per-caller (authenticated user, or IP if unauthenticated) ceiling for the general API,
    # via RateLimitFilter. Deliberately generous — this catches abuse, not legitimate heavy use
    # (bulk CSV import, report-card PDF generation). Doesn't apply to /api/v1/public/**, which
    # has its own tighter, endpoint-specific limiters.
    requests-per-minute: ${RATE_LIMIT_PER_MINUTE:300}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  # Render injects PORT and requires the app to bind to it; SERVER_PORT stays as a local-dev override.
  port: ${PORT:${SERVER_PORT:8080}}

logging:
  level:
    com.school.app: INFO
