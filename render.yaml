# Render Blueprint — deploy from the Render dashboard via "New > Blueprint",
# pointing at this repo (school-management-app-backend).
#
# NOTE: APP_CORS_ALLOWED_ORIGINS and VITE_API_BASE_URL below assume the service
# names below are available and Render assigns them the predictable
# https://<name>.onrender.com hostname. If Render appends a suffix because a
# name was taken, update both values by hand after the first deploy.
databases:
  - name: school-app-db
    databaseName: school_app
    user: school_app
    plan: free

services:
  - type: web
    name: school-app-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase:
          name: school-app-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: school-app-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: school-app-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: school-app-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: school-app-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://school-app-web.onrender.com
      # SMS/email/payments stay unset (features no-op gracefully) until you have real
      # credentials — add MSG91_AUTH_KEY, MSG91_SENDER_ID, SES_SMTP_*, RAZORPAY_* here then.

  - type: web
    name: school-app-web
    runtime: static
    repo: https://github.com/ravisharma1062/school-management-app-ui.git
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://school-app-backend.onrender.com
