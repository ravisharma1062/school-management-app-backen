# Render Blueprint — deploy from the Render dashboard via "New > Blueprint",
# pointing at this repo (school-management-app-backend).
#
# The Postgres instance is provisioned manually (not by this blueprint) — deploy the
# backend web service in the SAME REGION as that database so it can use the free/fast
# internal hostname instead of routing over the public internet. DB_URL/DB_USERNAME/
# DB_PASSWORD are declared with sync: false: Render will prompt for them in the
# dashboard on first deploy and stores them as secrets — they are never written here.
#
# NOTE: APP_CORS_ALLOWED_ORIGINS and VITE_API_BASE_URL below assume the service
# names below are available and Render assigns them the predictable
# https://<name>.onrender.com hostname. If Render appends a suffix because a
# name was taken, update both values by hand after the first deploy.
services:
  - type: web
    name: school-app-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://school-app-web.onrender.com
      # SMS/email/payments stay unset (features no-op gracefully) until you have real
      # credentials — add MSG91_AUTH_KEY, MSG91_SENDER_ID, SES_SMTP_*, RAZORPAY_* here then.

  - type: web
    name: school-app-web
    runtime: static
    repo: https://github.com/ravisharma1062/school-management-app-ui.git
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://school-app-backend.onrender.com
