# Render Blueprint — reference only at this point, NOT deployed as a Blueprint.
#
# The backend is already live, deployed manually (not via this file) as
# "school-management-app-backen" at https://school-management-app-backen.onrender.com
# (Render assigned that name from the repo name, not the "school-app-backend" this
# file originally predicted). Running "New > Blueprint" against this file now would
# create a SECOND, duplicate backend service — don't do that. Deploy the frontend the
# same way the backend was deployed: manually, via Render's "New > Static Site",
# pointing at the school-management-app-ui repo, build command `npm run build`,
# publish directory `dist`, with a `/* -> /index.html` rewrite rule.
#
# After that manual frontend deploy:
#   1. Note its real assigned URL.
#   2. Set VITE_API_BASE_URL on the frontend static site (rebuild triggers a redeploy).
#   3. Set APP_CORS_ALLOWED_ORIGINS on the backend service to that same URL (confirmed
#      via a live preflight test that anything not explicitly allowed gets a 403).
#
# The block below is kept as a record of the intended config, not something to run.
services:
  - type: web
    name: school-app-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_CORS_ALLOWED_ORIGINS
        value: https://school-app-web.onrender.com
      # SMS/email/payments stay unset (features no-op gracefully) until you have real
      # credentials — add MSG91_AUTH_KEY, MSG91_SENDER_ID, SES_SMTP_*, RAZORPAY_* here then.

  - type: web
    name: school-app-web
    runtime: static
    repo: https://github.com/ravisharma1062/school-management-app-ui.git
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://school-management-app-backen.onrender.com
