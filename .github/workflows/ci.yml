name: CI

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # ubuntu-latest ships Docker preinstalled and running, so the Testcontainers-backed
      # integration tests work the same way they do locally — no extra setup needed.
      - name: Run full test suite (unit + Testcontainers integration + Cucumber)
        run: mvn -B test
